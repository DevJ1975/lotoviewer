<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SoteriaField">
  <!-- 512×512 maskable PWA icon. The manifest specifies
       purpose="maskable" so we keep the design well within the safe
       inner zone (40% of width = ~200px from each edge) so platform
       masks don't crop the reticle. Same target/reticle as
       icon-192.svg + app/icon.svg, scaled up. -->
  <rect width="512" height="512" rx="80" fill="#1B3A6B"/>

  <!-- Crosshair lines. Pulled in from the edges so a circular mask
       crop doesn't truncate them. -->
  <g stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="80"  x2="256" y2="160"/>
    <line x1="256" y1="352" x2="256" y2="432"/>
    <line x1="80"  y1="256" x2="160" y2="256"/>
    <line x1="352" y1="256" x2="432" y2="256"/>
  </g>

  <!-- Scope frame: rounded square inside the maskable safe zone. -->
  <rect x="128" y="128" width="256" height="256" rx="28"
        fill="none" stroke="#FFFFFF" stroke-width="18"/>

  <!-- Corner brackets. -->
  <g stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" fill="none">
    <path d="M 156 188 V 156 H 188"/>
    <path d="M 324 156 H 356 V 188"/>
    <path d="M 356 324 V 356 H 324"/>
    <path d="M 188 356 H 156 V 324"/>
  </g>

  <!-- Focal dot — teal-500. -->
  <circle cx="256" cy="256" r="28" fill="#14B8A6"/>
</svg>

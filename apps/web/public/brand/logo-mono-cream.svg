<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="SoteriaField"
     preserveAspectRatio="xMinYMid meet">
  <!--
    SoteriaField wordmark — monochrome cream variant.
    Mark + wordmark all in cream/beige. Use on dark or photographic
    backdrops where the colour-accent variant would clash (drawer
    nav on dark theme, splash screen, mobile home-screen icon at
    larger sizes).
  -->
  <g transform="translate(20, 40)">
    <g stroke="#F0EDDA" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <line x1="120" y1="6"   x2="120" y2="46"/>
      <line x1="120" y1="194" x2="120" y2="234"/>
      <line x1="6"   y1="120" x2="46"  y2="120"/>
      <line x1="194" y1="120" x2="234" y2="120"/>
    </g>
    <rect x="46" y="46" width="148" height="148" rx="8"
          fill="none" stroke="#F0EDDA" stroke-width="9"/>
    <g stroke="#F0EDDA" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M 60 80 V 60 H 80"/>
      <path d="M 160 60 H 180 V 80"/>
      <path d="M 180 160 V 180 H 160"/>
      <path d="M 80 180 H 60 V 160"/>
    </g>
    <circle cx="120" cy="120" r="14" fill="#F0EDDA"/>
  </g>
  <text x="320" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="200"
        letter-spacing="-6"
        fill="#F0EDDA">SoteriaField</text>
</svg>

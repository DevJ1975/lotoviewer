<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="SoteriaField"
     preserveAspectRatio="xMinYMid meet">
  <!--
    SoteriaField wordmark — colour-transparent variant.
    Reticle mark on the left (cream/teal accent), wordmark on the
    right with "Soteria" cream + "Field" teal. Transparent
    background so the logo drops onto any colour surface.

    Used on: login page (hero), welcome page, marketing surfaces
    that sit on dark or photographic backdrops.

    Type: relies on system bold sans-serif. Kerning + weight will
    render close to the reference image without shipping a font
    file. SVG-only so the asset stays under 2 KB and crisp at any
    scale.
  -->

  <!-- ── Mark (reticle) ─────────────────────────────────────────────── -->
  <!-- 240×240 reticle mark inside a 280×280 bounding box, padded so
       the wordmark baseline aligns with the mark's vertical centre. -->
  <g transform="translate(20, 40)">
    <!-- Crosshair lines, fading near centre. -->
    <g stroke="#F0EDDA" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <line x1="120" y1="6"   x2="120" y2="46"/>
      <line x1="120" y1="194" x2="120" y2="234"/>
      <line x1="6"   y1="120" x2="46"  y2="120"/>
      <line x1="194" y1="120" x2="234" y2="120"/>
    </g>
    <!-- Scope frame. -->
    <rect x="46" y="46" width="148" height="148" rx="8"
          fill="none" stroke="#F0EDDA" stroke-width="9"/>
    <!-- Corner brackets. -->
    <g stroke="#F0EDDA" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M 60 80 V 60 H 80"/>
      <path d="M 160 60 H 180 V 80"/>
      <path d="M 180 160 V 180 H 160"/>
      <path d="M 80 180 H 60 V 160"/>
    </g>
    <!-- Focal dot — teal accent. -->
    <circle cx="120" cy="120" r="14" fill="#14B8A6"/>
  </g>

  <!-- ── Wordmark ──────────────────────────────────────────────────── -->
  <!-- Two text spans: "Soteria" cream + "Field" teal. We keep them
       as two separate <text> elements so the colour split is exact
       even when the font picks a fallback weight. -->
  <text x="320" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="200"
        letter-spacing="-6"
        fill="#F0EDDA">Soteria</text>
  <text x="788" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="200"
        letter-spacing="-6"
        fill="#14B8A6">Field</text>
</svg>

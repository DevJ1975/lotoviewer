<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" role="img" aria-label="SoteriaField"
     preserveAspectRatio="xMinYMid meet">
  <!--
    SoteriaField wordmark — dark/black variant.
    Reticle mark in black + teal dot, wordmark with "Soteria" black
    + "Field" grey. Transparent background; designed for white or
    light-cream surfaces (in-app chrome, light-theme PDFs, default
    email backdrop).
  -->

  <g transform="translate(20, 40)">
    <g stroke="#0F172A" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <line x1="120" y1="6"   x2="120" y2="46"/>
      <line x1="120" y1="194" x2="120" y2="234"/>
      <line x1="6"   y1="120" x2="46"  y2="120"/>
      <line x1="194" y1="120" x2="234" y2="120"/>
    </g>
    <rect x="46" y="46" width="148" height="148" rx="8"
          fill="none" stroke="#0F172A" stroke-width="9"/>
    <g stroke="#0F172A" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M 60 80 V 60 H 80"/>
      <path d="M 160 60 H 180 V 80"/>
      <path d="M 180 160 V 180 H 160"/>
      <path d="M 80 180 H 60 V 160"/>
    </g>
    <circle cx="120" cy="120" r="14" fill="#14B8A6"/>
  </g>

  <text x="300" y="232"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="190"
        letter-spacing="-4">
    <tspan fill="#0F172A">Soteria</tspan><tspan fill="#6B7280">Field</tspan>
  </text>
</svg>

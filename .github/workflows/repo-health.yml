name: Repo health

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository guards
        run: npm run check:repo

      - name: Run wiki sync
        if: github.event_name == 'pull_request'
        env:
          WIKI_SYNC_BASE: origin/${{ github.base_ref }}
        run: npm run check:wiki
